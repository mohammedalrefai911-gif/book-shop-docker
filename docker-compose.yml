services:
  db:
    image: postgres:15
    container_name: bookshop_db
    environment:
      POSTGRES_DB: bookshop_db
      POSTGRES_USER: bookshop_user
      POSTGRES_PASSWORD: bookshop_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshop_user -d bookshop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./book-shop
    container_name: bookshop_backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-bookshop-docker-secret-key
      POSTGRES_DB: bookshop_db
      POSTGRES_USER: bookshop_user
      POSTGRES_PASSWORD: bookshop_password
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data: